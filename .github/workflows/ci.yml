name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Run type check
        run: npm run check

      - name: Run electron type check
        run: npm run check:electron

      - name: Run tests
        run: npm test

      - name: Build app for E2E
        run: npm run build:electron && npm run build

      - name: Run E2E tests
        # xvfb-run provides an in-memory X Virtual Framebuffer so Electron can
        # open BrowserWindows without a real display — effectively headless CI.
        run: xvfb-run --auto-servernum npm run test:e2e
        env:
          ELECTRON_DISABLE_SANDBOX: "1"
