name: Build and Release macOS Package

# --------------------------------------------------------------
# Permissions needed for creating / updating a release
permissions:
  contents: write
# --------------------------------------------------------------

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build

      - name: Package as macOS app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-forge make --targets=@electron-forge/maker-zip,@electron-forge/maker-dmg
      
      - name: Upload macOS artefacts with 1 day retention (always)
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            out/make/**/*.zip
            out/make/**/*.dmg
          retention-days: 1

      - name: Upload .dmg and .zip to GitHub Release (only on tag)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            out/make/**/*.zip
            out/make/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
