name: Build and package macOS distributables

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build

      - name: Package as macOS app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-forge import
          npx electron-forge make --targets=@electron-forge/maker-zip,@electron-forge/maker-dmg

      - name: Upload macOS app as artifact
        uses: actions/upload-artifact@v3
        with:
          name: electron-app-macos
          path: |
            out/make/*.dmg
            out/make/*.zip
