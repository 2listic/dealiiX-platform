name: Build and Release .deb Package

# --------------------------------------------------------------
# Permissions needed for creating / updating a release
permissions:
  contents: write
# --------------------------------------------------------------


on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20"

      - name: Install required system dependencies for FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build

      - name: Package as .deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-forge make --targets=@electron-forge/maker-deb

      # Distributables are already uploaded as GitHub realeses on tags in the following step
      # Consider to delete this step if not needed for debugging
      # - name: Upload .deb artifact with 1 day retention (always)
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: deb-package
      #     path: out/make/**/*.deb
      #     retention-days: 1

      - name: Upload .deb to GitHub Release (only on tag)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/make/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
