name: Build and Release .deb Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20"

      - name: Install required system dependencies for FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build

      - name: Package as .deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-forge import
          npx electron-forge make --targets=@electron-forge/maker-deb

      # - name: Upload .deb as artifact (always)
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: electron-app-deb
      #     path: out/make/**/*.deb

      - name: Upload .deb to GitHub Release (only on tag)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/make/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
