name: Release Linux (.deb)

# --------------------------------------------------------------
# Permissions needed for creating / updating a release
permissions:
  contents: write
# --------------------------------------------------------------

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install required system dependencies for FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Install npm dependencies
        run: npm install

      - name: Run type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build Electron app
        run: npm run build

      - name: Package as .deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-forge make --targets=@electron-forge/maker-deb

      # Upload only when triggered by a tag push — skipped on manual workflow_dispatch
      # (which is useful to test the build without creating a GitHub Release)
      - name: Upload .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/make/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
