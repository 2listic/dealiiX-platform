name: Release macOS (.dmg)

# --------------------------------------------------------------
# Permissions needed for creating / updating a release
permissions:
  contents: write
# --------------------------------------------------------------

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Run type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build Electron app
        run: npm run build

      - name: Package as macOS app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-forge make --targets=@electron-forge/maker-zip,@electron-forge/maker-dmg

      # Upload only when triggered by a tag push — skipped on manual workflow_dispatch
      # (which is useful to test the build without creating a GitHub Release)
      - name: Upload .dmg and .zip to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            out/make/**/*.zip
            out/make/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
