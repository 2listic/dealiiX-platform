services:
  coral-ssh-slurm:
    build:
      context: .
      dockerfile: Dockerfile.coral
    image: coral-ssh-slurm:latest
    container_name: coral-ssh-slurm
    hostname: slurm
    ports:
      - '2222:22'
      - '6817:6817'
      - '6818:6818'
      - '8000:8000'
    volumes:
      - ./containers/shared-data:/app/shared-data
      - ~/.ssh/id_ed25519.pub:/tmp/ssh_key.pub:ro
    environment:
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
    networks:
      - coral-network
    # restart: unless-stopped

  coral-visualizer:
    build:
      context: ./coral-visualizer
      dockerfile: Dockerfile
    image: coral-visualizer:latest
    container_name: coral-visualizer
    ports:
      - '8008:8080'
    volumes:
      - ./containers/shared-data:/deploy/data
    networks:
      - coral-network
    depends_on:
      - coral-ssh-slurm
    # restart: unless-stopped

  coral-remote-server:
    build:
      context: ./coral-remote-server
    image: coral-remote-server:latest
    container_name: coral-remote-server
    ports:
      - '8080:8080'
    volumes:
      - ./coral-remote-server/data:/root/data
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - PORT=8080
      - DB_PATH=/root/data/coral.db
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
    networks:
      - coral-network
    # restart: unless-stopped

networks:
  coral-network:
    driver: bridge
